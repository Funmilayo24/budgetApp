services:
  db:
    image: postgres:16-alpine
    container_name: budget_app_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-budgetapp}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-budgetapp_dev_password}"
      POSTGRES_DB: "${POSTGRES_DB:-budgetapp}"
    volumes:
      - budget_app_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budgetapp} -d ${POSTGRES_DB:-budgetapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  budget_app_postgres_data:

