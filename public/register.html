<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account | Budget App</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-panel">
        <p class="eyebrow">Budget App</p>
        <h1>Create Account</h1>
        <p class="auth-context">Start your private personal budget.</p>
        <form id="registerForm" class="stacked-form">
          <label>
            <span>Name</span>
            <input name="name" type="text" autocomplete="name" maxlength="80" required>
          </label>
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" maxlength="254" required>
          </label>
          <label>
            <span>Password</span>
            <input name="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label>
            <span>Confirm password</span>
            <input name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label class="checkbox-field">
            <input name="acceptedPrivacyPolicy" type="checkbox" required>
            <span>I have read and accept the <a href="privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.</span>
          </label>
          <button class="primary-button" id="registerButton" type="submit">Create Account</button>
          <p class="form-message" id="registerMessage" role="status"></p>
        </form>
        <a class="auth-link" href="login.html">Already have an account? Log in</a>
        <div class="auth-policy-links">
          <a href="privacy.html">Privacy Policy</a>
          <a href="delete-account.html">Account deletion</a>
        </div>
      </section>
    </main>
    <script src="register.js"></script>
  </body>
</html>
